networks:
  cme-net:
    driver: bridge

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: cme-timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-cme_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cme_data}
    ports:
      - "${DB_PORT:-5433}:5432" # Exposed on port 5433 on the host to avoid conflict with Trade-Project (5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cme_user} -d ${DB_NAME:-cme_data}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cme-net

  fetcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cme-fetcher
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-cme_user}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cme_data}
      HEADLESS: "true"
      NODE_ENV: production
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./errors:/app/errors
      - ./config:/app/config
    restart: unless-stopped
    shm_size: '2gb' # Chrome/Chromium requires shared memory
    networks:
      - cme-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cme-api
    command: ["node", "dist/dashboard/DashboardServer.js"]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-cme_user}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cme_data}
      DASHBOARD_PORT: 3002
      NODE_ENV: production
    ports:
      - "${API_PORT:-3002}:3002"
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./errors:/app/errors
      - ./config:/app/config
    restart: unless-stopped
    networks:
      - cme-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cme-dashboard
    depends_on:
      api:
        condition: service_healthy
    env_file: .env
    environment:
      BACKEND_API_URL: http://api:3002
      PORT: 3000
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ./output:/output # Mounted to /output to match the Next.js relative path resolution (../output)
    restart: unless-stopped
    networks:
      - cme-net

volumes:
  pgdata:
